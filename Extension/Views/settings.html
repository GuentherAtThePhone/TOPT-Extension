<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="settings.css">
    <title data-i18n="settingsText"></title>
  </head>
  <body>
    <div class="container">
      <h1 data-i18n="settingsText"></h1>

      <h2 data-i18n="apperanceText"></h2>

      <div class="setting">
        <label data-i18n="themeText"></label>
        <select id="themeSelect">
          <option value="dark" data-i18n="themeDarkText"></option>
          <option value="light" data-i18n="themeLightText"></option>
          <option value="default" data-i18n="themeDefaultText"></option>
        </select>
      </div>

      <div class="setting" style="display: none;">
        <label data-i18n="syncWithMozillaText"></label>
        <select id="syncMozillaSelect">
          <option data-i18n="yes" value="true"></option>
          <option data-i18n="no" value="false"></option>
        </select>
      </div>

      <div class="setting">
        <label data-i18n="fontSizeText"></label>
        <select id="fontSizeSelect">
          <option data-i18n="fontSizeSmall" value="small"></option>
          <option data-i18n="fontSizeMedium" value="medium"></option>
          <option data-i18n="fontSizeLarge" value="large"></option>
        </select>
      </div>

      <div class="setting">
        <label data-i18n="showNextCodeText"></label>
        <select id="showNextCodeSelect">
          <option data-i18n="yes" value="true"></option>
          <option data-i18n="no" value="false"></option>
        </select>
      </div>

      <h2 data-i18n="passwordText"></h2>

      <div class="setting">
        <label data-i18n="useMasterPasswordText"></label>
        <select id="useMasterPasswordSelect">
          <option data-i18n="yes" value="true"></option>
          <option data-i18n="no" value="false"></option>
        </select>
      </div>

      <div class="setting" style="display: none;">
        <label data-i18n="useBiometricsText"></label>
        <select id="useBiometricsSelect">
          <option data-i18n="yes" value="true"></option>
          <option data-i18n="no" value="false"></option>
        </select>
      </div>

      <div class="button-group">
        <button id="changePwBtn" data-i18n="changePasswordText" class="secondary"></button>
        <button id="saveBtn" data-i18n="saveBtnText" class="primary"></button>
      </div>

      <div class="setting">
        <button data-i18n="resetAddonBtnText" class="secondary" id="resetAddonBtn"></button>
      </div>
    </div>

    <div class="below-container">
      <span style="text-align: center;">Version 1.1.0</span>
      <span style="text-align: center;"> | </span>
      <a href="#" id="openPopup" style="text-align: center; vertical-align: middle;">Libraries</a>
    </div>

    <div id="popupOverlay" class="popup-overlay">
      <div class="popup">
        <h2>Libraries</h2>
        <h3>jsQR</h3>
        <div style="display: flex; flex-direction: column;">
          <span style="font-size: medium;">developer: cozmo</span>
          <a href="https://github.com/cozmo/jsQR">project repository</a>
          <a href="https://www.apache.org/licenses/LICENSE-2.0.txt">Apache License Version 2.0</a>
        </div>
        <h3>webextension-polyfill</h3>
        <div style="display: flex; flex-direction: column;">
          <span style="font-size: medium;">developer: mozilla</span>
          <a href="https://github.com/mozilla/webextension-polyfill">project repository</a>
          <a href="https://github.com/mozilla/webextension-polyfill/blob/master/LICENSE">MPL 2.0</a>
        </div>
        <button style="margin-top: 10px;" id="closePopup">Close</button>
      </div>
    </div>

    <script src="../librarys/browser-polyfill.js"></script>
    <script src="../Models/account.js"></script>
    <script src="../Models/encryption.js"></script>
    <script src="../Models/settingsModel.js"></script>
    <script src="settings.js"></script>
  </body>
</html>
